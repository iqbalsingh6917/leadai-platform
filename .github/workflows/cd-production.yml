name: CD — Production

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  EKS_CLUSTER: leadai-production
  NAMESPACE: leadai-production

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/leadai-api:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/leadai-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/leadai-web:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/leadai-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PRODUCTION_API_URL }}

      - name: Build and push AI Services image
        uses: docker/build-push-action@v5
        with:
          context: apps/ai-services
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/leadai-ai-services:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/leadai-ai-services:latest

  deploy-production:
    name: Deploy to Production (EKS) — requires approval
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # GitHub environment with required reviewers

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Blue-green Helm upgrade
        run: |
          helm upgrade --install leadai ./infrastructure/kubernetes/helm/leadai \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set api.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set web.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set aiServices.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set global.environment=production \
            --values infrastructure/kubernetes/helm/leadai/values-production.yaml \
            --atomic --wait --timeout 10m

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Deployed commit: `${{ needs.build-and-push.outputs.image_tag }}`
            Triggered by: @${{ github.actor }}

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 *Production deploy succeeded* — `${{ needs.build-and-push.outputs.image_tag }}` is live on https://app.leadai.in"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🔥 *Production deploy FAILED* — immediate attention required! <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
