apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DB_HOST: {{ .Values.secrets.dbHost | quote }}
  DB_PORT: {{ .Values.secrets.dbPort | quote }}
  DB_NAME: {{ .Values.secrets.dbName | quote }}
  DB_USERNAME: {{ .Values.secrets.dbUsername | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  NEO4J_URI: {{ .Values.secrets.neo4jUri | quote }}
  NEO4J_USER: {{ .Values.secrets.neo4jUser | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
