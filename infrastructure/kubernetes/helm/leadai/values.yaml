# LeadAI Platform — Helm values
# Override per-environment with: -f values-staging.yaml or -f values-production.yaml

global:
  environment: production
  imageRegistry: ""        # e.g. 123456789.dkr.ecr.ap-south-1.amazonaws.com
  imagePullSecrets: []

# ── API (NestJS) ─────────────────────────────────────────────────────────────
api:
  replicaCount: 2
  image:
    repository: leadai-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    NODE_ENV: production
    PORT: "3000"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ── Web (Next.js) ─────────────────────────────────────────────────────────────
web:
  replicaCount: 2
  image:
    repository: leadai-web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── AI Services (Python / FastAPI) ───────────────────────────────────────────
aiServices:
  replicaCount: 1
  image:
    repository: leadai-ai-services
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 60

# ── Ingress ────────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: app.leadai.in
      paths:
        - path: /
          pathType: Prefix
          service: web
    - host: api.leadai.in
      paths:
        - path: /
          pathType: Prefix
          service: api
  tls:
    - secretName: leadai-tls
      hosts:
        - app.leadai.in
        - api.leadai.in

# ── Secrets (override with actual values) ─────────────────────────────────────
secrets:
  jwtSecret: ""
  dbHost: ""
  dbPort: "5432"
  dbName: "leadai"
  dbUsername: "leadai"
  dbPassword: ""
  redisUrl: ""
  openaiApiKey: ""
  neo4jUri: ""
  neo4jUser: "neo4j"
  neo4jPassword: ""

# ── Namespace ─────────────────────────────────────────────────────────────────
namespace: leadai
